<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Page</title>
    <link rel="stylesheet" href="property.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">GROUP 5</div>

    <nav>
        <button onclick="goHome()">Home</button>
        <button onclick="goWorkspace()">Workspace</button>
        <button onclick="logout()">Logout</button>
    </nav>
</header>

<!-- MAIN -->
<div class="container">

    <h2>PROPERTY</h2>
    <p>Enter property details below</p>

    <form id="propertyForm">

    <label>Address:</label>
        <input type="text" id="address">
        <p class="error" id="addressError"></p>

    <label>Neighborhood:</label>
        <input type="text" id="neighborhood">

    <label>Square Feet:</label>
        <input type="number" id="sqft">

    <div class="form-row">
        <label>Parking Available:</label>

    <div class="options">
        <label><input type="radio" name="parking" value="Yes"> Yes</label>
        <label><input type="radio" name="parking" value="No"> No</label>
    </div>
</div>

<div class="form-row">
    <label>Accessible by Public Transport:</label>

    <div class="options">
        <label><input type="radio" name="transport" value="Yes"> Yes</label>
        <label><input type="radio" name="transport" value="No"> No</label>
    </div>
</div>

    <label>Upload Image:</label>
    <input type="file" id="imageUpload">

    <button type="button" onclick="saveProperty()">Add / Update Property</button>

    </form>

    <div id="preview"></div>

</div>

<!-- FOOTER -->
<footer class="footer">
  © 2026 Group 5
</footer>

<script src="property.js"></script>
</body>
</html>

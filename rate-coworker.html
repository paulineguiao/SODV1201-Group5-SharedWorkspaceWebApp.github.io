<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Coworker</title>
    <link rel="stylesheet" href="workspace-details.css">

    <style>
        .top-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 1px solid #666;
            border-radius: 4px;
            background: white;
            cursor: pointer;
        }

        .coworker-container {
            width: 95%;
            margin: 20px auto;
            border: 1px solid #666;
            background: white;
            padding: 20px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .coworker-left,
        .coworker-right {
            flex: 1;
            min-width: 350px;
        }

        .detail-row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        .detail-row label {
            width: 160px;
            font-weight: bold;
        }

        .detail-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #666;
            border-radius: 4px;
        }

        .review-box {
            border: 1px solid #666;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .review-box textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #666;
            border-radius: 4px;
            resize: none;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .review-card {
            border: 1px solid #666;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stars {
            color: goldenrod;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="page-title">Rate Coworker Page</div>

    <header>
        <h1>HEADER<br>[Logo/Title]</h1>

        <div class="top-buttons">
            <button class="nav-btn" onclick="goHome()">Home</button>
            <button class="nav-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main>

        <div class="coworker-container">

            <div class="coworker-left">

                <h2>RATE COWORKER</h2>

                <div class="detail-row">
                    <label>Coworker Name:</label>
                    <input type="text" value="Meeting Room / Private Office">
                </div>

                <div class="detail-row">
                    <label>Workspace Used:</label>
                    <input type="text" value="Owner's Property">
                </div>

                <div class="detail-row">
                    <label>Date of Use:</label>
                    <input type="date">
                </div>

                <div class="detail-row">
                    <label>Rating:</label>
                    <div class="stars">★★★★★</div>
                </div>

            </div>

            <div class="coworker-right">

                <div class="review-box">

                    <h3>Rate this Workspace:</h3>

                    <div class="stars">☆☆☆☆☆</div>

                    <textarea
                        id="coworkerReview"
                        placeholder="Write your review here..."
                    ></textarea>

                    <button class="submit-btn" onclick="submitCoworkerReview()">
                        Submit Review
                    </button>

                </div>

                <h3>Previous Reviews:</h3>

                <div id="coworkerReviews">

                    <div class="review-card">
                        <span>"Great communication!" - Owner Name</span>
                        <span class="stars">★★★★★</span>
                    </div>

                    <div class="review-card">
                        <span>"Very respectful coworker." - Owner Name</span>
                        <span class="stars">★★★★☆</span>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer>
        <p>FOOTER</p>
        <p>© 2026 Group 5</p>
    </footer>

    <script src="rate-coworker.js"></script>

</body>
</html>

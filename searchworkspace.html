<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Workspaces</title>
    <link rel="stylesheet" href="searchworkspace.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img class="img" src="header image.png" alt="Logo">

        <div class="nav-buttons">
           <!-- <button onclick="window.location.href='coworkerhome.html'">Coworker Home</button>-->
            <button onclick="window.location.href='workspace-details.html'">Workspace Details</button>
            <button onclick="window.location.href='index.html'">Logout</button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <h2>SEARCH WORKSPACES</h2>

        <!-- FILTERS -->
        <div class="filters">

            <div class="form-group">
                <label>Address:</label>
                <input type="text" id="address">
            </div>

            <div class="form-group">
                <label>Neighborhood:</label>
                <input type="text" id="neighborhood">
            </div>

            <div class="form-group">
                <label>Square Feet:</label>
                <input type="number" id="sqft">
            </div>

            <div class="form-group">
                <label>Parking:</label>
                <select id="parking">
                    <option value="">Any</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Public Transport:</label>
                <select id="transport">
                    <option value="">Any</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Seats:</label>
                <input type="number" id="seats">
            </div>

            <div class="form-group">
                <label>Smoking:</label>
                <select id="smoking">
                    <option value="">Any</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Available Date:</label>
                <input type="date" id="date">
            </div>

            <div class="form-group">
                <label>Term:</label>
                <select id="term">
                    <option value="">Any</option>
                    <option value="day">Day</option>
                    <option value="week">Week</option>
                    <option value="month">Month</option>
                </select>
            </div>

            <div class="form-group">
                <label>Price:</label>
                <input type="number" id="price">
            </div>

            <div class="buttons">
                <button id="searchBtn">Search</button>
            </div>

        </div>

        <hr>

        <!-- RESULTS -->
        <div id="results" class="results"></div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 Group 5
    </div>

</div>

<script src="searchworkspace.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Details</title>
    <link rel="stylesheet" href="workspace-details.css">
    <style>
        .top-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 1px solid #666;
            border-radius: 4px;
            background: white;
            cursor: pointer;
        }

        .workspace-container {
            width: 95%;
            margin: 20px auto;
            border: 1px solid #666;
            background: white;
            padding: 20px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .workspace-left {
            flex: 1;
            min-width: 350px;
        }

        .workspace-right {
            flex: 1;
            min-width: 350px;
        }

        .workspace-photo {
            width: 120px;
            height: 120px;
            border: 1px solid #666;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .detail-row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        .detail-row label {
            width: 160px;
            font-weight: bold;
        }

        .detail-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #666;
            border-radius: 4px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .review-box {
            border: 1px solid #666;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .review-box textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #666;
            border-radius: 4px;
            resize: none;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .review-card {
            border: 1px solid #666;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stars {
            color: goldenrod;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="page-title">Workspace Details Page</div>

    <header>
        <h1>HEADER<br>[Logo/Title]</h1>

        <div class="top-buttons">
            <button class="nav-btn" onclick="goHome()">Home</button>
            <button class="nav-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main>
        <div class="workspace-container">

            <div class="workspace-left">
                <h2>WORKSPACE DETAILS</h2>

                <img src="https://via.placeholder.com/120"
                     alt="Workspace Photo"
                     class="workspace-photo">

                <div class="detail-row">
                    <label>Workspace Type:</label>
                    <input type="text" value="Meeting Room / Private Office">
                </div>

                <div class="detail-row">
                    <label>Property:</label>
                    <input type="text" value="Owner's Property">
                </div>

                <div class="detail-row">
                    <label>Address:</label>
                    <input type="text">
                </div>

                <div class="detail-row">
                    <label>No. of Seats:</label>
                    <input type="number">
                </div>

                <div class="detail-row">
                    <label>Smoking Allowed:</label>

                    <div class="radio-group">
                        <label><input type="radio" name="smoke"> Yes</label>
                        <label><input type="radio" name="smoke"> No</label>
                    </div>
                </div>

                <div class="detail-row">
                    <label>Availability Date:</label>
                    <input type="date">
                </div>

                <div class="detail-row">
                    <label>Term:</label>
                    <input type="text" placeholder="Day / Week / Month">
                </div>

                <div class="detail-row">
                    <label>Price:</label>
                    <input type="text">
                </div>

                <div class="detail-row">
                    <label>Rating:</label>
                    <div class="stars">★★★★★</div>
                </div>
            </div>

            <div class="workspace-right">

                <div class="review-box">
                    <h3>Rate this Workspace:</h3>

                    <div class="stars">☆☆☆☆☆</div>

                    <textarea
                        id="reviewText"
                        placeholder="Write your review here..."
                    ></textarea>

                    <button class="submit-btn" onclick="submitReview()">
                        Submit Review
                    </button>
                </div>

                <h3>Previous Reviews:</h3>

                <div id="reviewsList">

                    <div class="review-card">
                        <span>"Great place!" - Coworker Name</span>
                        <span class="stars">★★★★★</span>
                    </div>

                    <div class="review-card">
                        <span>"Very clean office." - Coworker Name</span>
                        <span class="stars">★★★★☆</span>
                    </div>

                    <div class="review-card">
                        <span>"Would book again." - Coworker Name</span>
                        <span class="stars">★★★★★</span>
                    </div>

                </div>

            </div>

        </div>
    </main>

    <footer>
        <p>FOOTER</p>
        <p>© 2026 Group 5</p>
    </footer>

    <script src="workspace-details.js"></script>

</body>
</html>
